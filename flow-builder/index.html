<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Tester - Paddling Pulse</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="flow.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header flow-site-header">
        <a class="brand" href="../index.html" aria-label="Paddling Pulse home">
            <img src="../assets/logo.svg" alt="Paddling Pulse logo">
            <span data-i18n="flow-title">Algorithm Tester</span>
        </a>

        <div class="tester-controls header-tester-controls">
            <button id="run-sim-btn" class="icon-button play-btn" title="Run Simulation" aria-label="Run Simulation">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            <button id="upload-pipeline-btn" class="icon-button upload-btn" type="button" title="Upload to DA14531" aria-label="Upload">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </button>
            <progress id="upload-progress" value="0" max="1"></progress>
            <p id="upload-status" class="status-pill">Idle</p>
        </div>

        <nav class="site-nav" aria-label="Primary">
            <a href="../index.html" data-i18n="nav-back">← Back to Site</a>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="fr">FR</button>
            </div>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="dsp-sidebar">
            <button
                id="sidebar-dock-btn"
                class="panel-dock panel-dock-sidebar"
                type="button"
                aria-controls="dsp-sidebar"
            >
                <span class="panel-dock-icon" aria-hidden="true"></span>
                <span class="panel-dock-text" data-i18n="sidebar-title">DSP Pipeline</span>
            </button>
            <div class="sidebar-header">
                <div class="sidebar-header-top">
                    <h2 data-i18n="sidebar-title">DSP Pipeline</h2>
                </div>
                <p id="catalog-status" class="status-pill" data-i18n="flow-status-loading">Loading catalog...</p>
            </div>
            <div id="palette-groups" class="palette-groups"></div>
        </aside>
        <main class="canvas-container" id="canvas">
            <svg id="wires-layer" class="wires-layer"></svg>
            <div id="blocks-layer" class="blocks-layer"></div>
            
            <div class="console-pane bottom-console" id="execution-console">
                <button
                    id="console-dock-btn"
                    class="panel-dock panel-dock-console"
                    type="button"
                    aria-controls="execution-console"
                >
                    <span class="panel-dock-icon" aria-hidden="true"></span>
                    <span class="panel-dock-text" data-i18n="graph-title">Execution Outputs</span>
                </button>
                <div class="console-header">
                    <h3 data-i18n="graph-title">Execution Outputs</h3>
                </div>
                <div class="console-outputs" id="console-outputs-container">
                    <pre id="graph-output-list" class="graph-output-list"></pre>
                    <pre id="runtime-diagnostics" class="graph-output-list"></pre>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/flow-block-catalog.js"></script>
    <script src="../js/script.js"></script>
    <script src="src/flow-graph.js"></script>
    <script src="src/flow-catalog.js"></script>
    <script src="src/flow-runtime-client.js"></script>
    <script src="src/flow-compiler.js"></script>
    <script src="src/flow-ble-upload.js"></script>
    <script src="src/flow-builder-viewmodel.js"></script>
    <script src="src/panel-docks.js"></script>
    <script src="src/flow.js"></script>
</body>
</html>
