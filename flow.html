<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Tester - Paddling Pulse</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="flow.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header flow-site-header">
        <a class="brand" href="index.html" aria-label="Paddling Pulse home">
            <img src="assets/logo.svg" alt="Paddling Pulse logo">
            <span data-i18n="flow-title">Algorithm Tester</span>
        </a>

        <nav class="site-nav" aria-label="Primary">
            <a href="index.html" data-i18n="nav-back">← Back to Site</a>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="fr">FR</button>
            </div>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 data-i18n="sidebar-title">DSP Pipeline</h2>
            </div>
            <div class="palette-container">
                <div class="palette-block" draggable="true" data-type="imu" data-i18n="block-imu">IMU Source (X/Y/Z)</div>
                <div class="palette-block" draggable="true" data-type="filter" data-i18n="block-filter">Low-Pass Filter</div>
                <div class="palette-block" draggable="true" data-type="harmonic" data-i18n="block-harmonic">Harmonic Rejection</div>
                <div class="palette-block" draggable="true" data-type="autocorr" data-i18n="block-autocorr">Autocorrelation</div>
                <div class="palette-block" draggable="true" data-type="kalman" data-i18n="block-kalman">Kalman Filter</div>
                <div class="palette-block" draggable="true" data-type="output" data-i18n="block-output">Cadence Output</div>
            </div>
            
            <div class="tester-controls">
                <button id="run-sim-btn" class="button button-primary" data-i18n="btn-run-sim">Run Simulation</button>
            </div>
            
            <div class="graph-panel">
                <h3 data-i18n="graph-title">Calculated Stroke Rate</h3>
                <canvas id="output-graph" width="230" height="120"></canvas>
            </div>
        </aside>
        <main class="canvas-container" id="canvas">
            <svg id="wires-layer" class="wires-layer"></svg>
            <div id="blocks-layer" class="blocks-layer"></div>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="flow.js"></script>
</body>
</html>
